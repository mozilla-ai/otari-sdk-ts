name: Release

# Independent release automation for this SDK (decoupled from the gateway's own
# releases). release-please watches main: each merged conventional commit
# accumulates into a release PR that bumps the version in package.json and
# updates CHANGELOG.md. Merging that release PR tags the release and creates a
# GitHub Release, and the publish job below ships it to npm in the same run (so
# no PAT is needed to chain a separate workflow off the release event).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance.
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run build

      # release-please already committed the version bump to package.json on
      # main, so publish picks it up with no tag-to-file patching needed.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
